{% load static %}
<div class="site-loader" id="siteLoader" role="status" aria-label="Opening CHRONOS">
  <div class="site-loader__dial" aria-hidden="true">
    <span class="site-loader__ring"></span>
    <img src="{% static 'images/watch_logo_mark.png' %}" alt="" class="site-loader__logo" width="112" height="112">
  </div>
  <div class="site-loader__brand">CHRONOS</div>
</div>
<style>
  body:not(.site-loaded) {
    overflow: hidden;
  }

  .site-loader {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background:
      radial-gradient(circle at 50% 42%, rgba(212, 175, 55, 0.16), transparent 34%),
      linear-gradient(135deg, #050505 0%, #0B0B0B 52%, #15110A 100%);
    color: #F5F5F5;
    opacity: 1;
    visibility: visible;
    transition: opacity 650ms ease, visibility 650ms ease;
  }

  .site-loader--quick {
    transition-duration: 220ms;
  }

  .site-loader--quick .site-loader__dial {
    animation-duration: 240ms;
  }

  .site-loader--quick .site-loader__brand {
    animation-duration: 240ms;
    animation-delay: 40ms;
  }

  .site-loaded .site-loader {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .site-loader__dial {
    position: relative;
    width: 154px;
    height: 154px;
    display: grid;
    place-items: center;
    animation: loader-rise 850ms cubic-bezier(.2, .8, .2, 1) both;
  }

  .site-loader__ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(212, 175, 55, 0.26);
    box-shadow: 0 0 42px rgba(212, 175, 55, 0.18), inset 0 0 28px rgba(212, 175, 55, 0.08);
    animation: loader-spin 1500ms linear infinite;
  }

  .site-loader__ring::before,
  .site-loader__ring::after {
    content: "";
    position: absolute;
    inset: 11px;
    border-radius: 50%;
    border-top: 2px solid #D4AF37;
    border-right: 2px solid transparent;
  }

  .site-loader__ring::after {
    inset: 26px;
    border-top-color: rgba(245, 245, 245, 0.8);
    animation: loader-spin 900ms linear infinite reverse;
  }

  .site-loader__logo {
    width: 92px;
    height: 92px;
    object-fit: contain;
    filter: drop-shadow(0 10px 24px rgba(212, 175, 55, 0.3));
    animation: loader-pulse 1100ms ease-in-out infinite alternate;
  }

  .site-loader__brand {
    position: relative;
    z-index: 1;
    font-family: "Playfair Display", Georgia, serif;
    font-size: clamp(2rem, 8vw, 4rem);
    font-weight: 700;
    letter-spacing: 0.28em;
    text-indent: 0.28em;
    color: #D4AF37;
    text-shadow: 0 0 30px rgba(212, 175, 55, 0.34);
    animation: loader-letter 900ms ease both 180ms;
  }

  @keyframes loader-spin {
    to { transform: rotate(360deg); }
  }

  @keyframes loader-pulse {
    from { transform: scale(0.92); opacity: 0.74; }
    to { transform: scale(1); opacity: 1; }
  }

  @keyframes loader-rise {
    from { transform: translateY(18px) scale(0.9); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  @keyframes loader-letter {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .site-loader,
    .site-loader__dial,
    .site-loader__ring,
    .site-loader__ring::after,
    .site-loader__logo,
    .site-loader__brand {
      animation: none !important;
      transition-duration: 180ms;
    }
  }
</style>
<script>
  (function () {
    var done = false;
    var storageKey = 'chronosSiteLoaderSeen';
    var hasSeenLoader = false;
    var loader = document.getElementById('siteLoader');

    try {
      hasSeenLoader = window.sessionStorage.getItem(storageKey) === '1';
    } catch (error) {
      hasSeenLoader = false;
    }

    if (hasSeenLoader && loader) {
      loader.classList.add('site-loader--quick');
    }

    function revealSite() {
      if (done) return;
      done = true;
      document.body.classList.add('site-loaded');
      try {
        window.sessionStorage.setItem(storageKey, '1');
      } catch (error) {}
      window.setTimeout(function () {
        var loader = document.getElementById('siteLoader');
        if (loader) loader.remove();
      }, hasSeenLoader ? 260 : 760);
    }

    if (hasSeenLoader) {
      window.addEventListener('DOMContentLoaded', function () {
        window.setTimeout(revealSite, 180);
      }, { once: true });
    } else {
      window.addEventListener('load', function () {
        window.setTimeout(revealSite, 1150);
      }, { once: true });
    }

    window.setTimeout(revealSite, hasSeenLoader ? 900 : 3200);
  })();
</script>
