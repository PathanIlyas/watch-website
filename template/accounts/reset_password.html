{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — CHRONOS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--gold:#D4AF37;--bg:#0B0B0B;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);font-family:'Poppins',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;}
    body::before{content:'';position:absolute;top:-150px;left:50%;transform:translateX(-50%);width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(212,175,55,.07) 0%,transparent 70%);pointer-events:none;}
    .wrapper{width:100%;max-width:420px;}
    .brand{text-align:center;margin-bottom:32px;}
    .brand-name{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;letter-spacing:8px;color:var(--gold);display:inline-flex;align-items:center;justify-content:center;gap:12px;line-height:1;}
    .brand-logo-img{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 4px 10px rgba(212,175,55,.22));}
    .brand-tag{font-size:.68rem;letter-spacing:4px;text-transform:uppercase;color:rgba(160,160,160,.55);margin-top:5px;}
    .brand-line{width:48px;height:1px;background:var(--gold);margin:12px auto 0;opacity:.5;}
    .card{background:rgba(26,26,26,.88);backdrop-filter:blur(28px);border:1px solid rgba(212,175,55,.18);border-radius:20px;padding:38px;box-shadow:0 28px 70px rgba(0,0,0,.65);}
    .card h4{font-family:'Playfair Display',serif;color:#F5F5F5;font-size:1.2rem;margin-bottom:6px;}
    .card p{color:rgba(160,160,160,.65);font-size:.83rem;margin-bottom:26px;}
    .form-label{color:rgba(245,245,245,.55);font-size:.73rem;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
    .input-wrap{position:relative;}
    .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(160,160,160,.4);font-size:.85rem;pointer-events:none;}
    .form-control{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#F5F5F5;border-radius:10px;padding:13px 40px 13px 40px;font-size:.9rem;transition:all .3s;width:100%;}
    .form-control:focus{background:rgba(212,175,55,.05);border-color:var(--gold);color:#F5F5F5;box-shadow:0 0 0 3px rgba(212,175,55,.1);outline:none;}
    .form-control::placeholder{color:rgba(245,245,245,.22);}
    .toggle-pwd{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(160,160,160,.5);cursor:pointer;padding:0;}
    .toggle-pwd:hover{color:var(--gold);}
    .btn-reset{background:linear-gradient(135deg,#D4AF37,#B8960C);color:#000;font-weight:700;border:none;border-radius:10px;padding:14px;font-size:.95rem;letter-spacing:1px;text-transform:uppercase;width:100%;transition:all .3s;cursor:pointer;}
    .btn-reset:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(212,175,55,.4);}
    .error-box{background:rgba(220,53,69,.1);border:1px solid rgba(220,53,69,.3);color:#f8d7da;border-radius:10px;padding:12px 16px;font-size:.85rem;margin-bottom:18px;}
    .strength-bar{height:3px;border-radius:2px;margin-top:6px;background:rgba(255,255,255,.08);}
    .strength-fill{height:100%;border-radius:2px;transition:all .3s;width:0;}
    .back-link{display:block;text-align:center;margin-top:20px;color:rgba(160,160,160,.4);font-size:.8rem;text-decoration:none;transition:color .3s;}
    .back-link:hover{color:var(--gold);}
  </style>
</head>
<body>
<div class="wrapper">
  <div class="brand">
    <div class="brand-name">
      <img src="{% static 'images/watch_logo_mark.png' %}" alt="" class="brand-logo-img" width="54" height="54">
      <span>CHRONOS</span>
    </div>
    <div class="brand-tag">Precision · Elegance · Legacy</div>
    <div class="brand-line"></div>
  </div>

  <div class="card">
    <h4>Set New Password</h4>
    <p>Choose a strong password for your CHRONOS account.</p>

    {% if error %}<div class="error-box"><i class="fas fa-exclamation-circle me-2"></i>{{ error }}</div>{% endif %}

    <form method="post" id="resetForm">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="password" id="pwdField" class="form-control" placeholder="Min 8 characters" required autofocus>
          <button type="button" class="toggle-pwd" onclick="togglePwd('pwdField','eye1')"><i class="fas fa-eye" id="eye1"></i></button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      </div>
      <div class="mb-4">
        <label class="form-label">Confirm New Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="password2" id="pwd2Field" class="form-control" placeholder="Repeat password" required>
          <button type="button" class="toggle-pwd" onclick="togglePwd('pwd2Field','eye2')"><i class="fas fa-eye" id="eye2"></i></button>
        </div>
      </div>
      <button type="submit" class="btn-reset">
        <i class="fas fa-check-circle me-2"></i>Reset Password
      </button>
    </form>
  </div>
  <a href="{% url 'login' %}" class="back-link"><i class="fas fa-arrow-left me-1"></i>Back to Login</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePwd(f,i){const el=document.getElementById(f),ic=document.getElementById(i);el.type=el.type==='password'?'text':'password';ic.classList.toggle('fa-eye');ic.classList.toggle('fa-eye-slash');}
  document.getElementById('pwdField').addEventListener('input',function(){
    const v=this.value,fill=document.getElementById('strengthFill');
    let s=0;if(v.length>=8)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;
    const c=['#ef4444','#f97316','#eab308','#22c55e'];
    fill.style.width=(s*25)+'%';fill.style.background=c[s-1]||'rgba(255,255,255,.08)';
  });
</script>
</body>
</html>
