<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONOS | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0F172A; /* Deep slate/blue dark background */
            --bg-card: #1E293B; /* Lighter slate for cards */
            --accent-gold: #38BDF8; /* Vibrant Sky Blue accent instead of gold */
            --text-light: #F8FAFC; /* Crisp cool white */
            --text-muted: #94A3B8; /* Cool blue-gray for muted text */
            --sidebar-width: 260px;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Glassmorphism Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(26, 26, 26, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px 0;
            z-index: 1000;
            transition: 0.3s ease;
        }

        .sidebar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-light);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .sidebar-brand span {
            color: var(--accent-gold);
        }

        .nav-item {
            padding: 5px 20px;
        }

        .nav-link {
            color: var(--text-muted);
            padding: 12px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.1);
        }

        .nav-link i {
            width: 20px;
            text-align: center;
            font-size: 1.1rem;
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
            min-height: 100vh;
        }

        /* Top Navbar */
        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: rgba(26, 26, 26, 0.5);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-bar {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            border-radius: 20px;
            padding: 8px 20px;
            width: 300px;
            transition: 0.3s;
        }

        .search-bar:focus {
            background: rgba(0, 0, 0, 0.8);
            border-color: var(--accent-gold);
            outline: none;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            color: white;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-profile img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-gold);
        }

        /* Glass Cards */
        .glass-card {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            transition: 0.3s;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Tables */
        .table-dark {
            background: transparent;
            color: var(--text-light);
        }

        .table-dark th {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            font-weight: 500;
            padding: 15px;
        }

        .table-dark td {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            vertical-align: middle;
        }

        /* Badges */
        .badge-gold { background: rgba(212, 175, 55, 0.2); color: var(--accent-gold); }
        .badge-green { background: rgba(40, 167, 69, 0.2); color: #28a745; }
        .badge-red { background: rgba(220, 53, 69, 0.2); color: #dc3545; }

        /* Forms Styling */
        .form-label {
            color: var(--text-light) !important;
            font-weight: 500;
        }

        .form-control, .form-select {
            background-color: var(--bg-card);
            border: 1px solid rgba(148, 163, 184, 0.3);
            color: var(--text-light);
            border-radius: 10px;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background-color: #172033; /* Slightly darker/lighter for focus */
            border-color: var(--accent-gold);
            color: white;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
            outline: none;
        }

        .form-control::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .form-select option {
            background-color: var(--bg-dark);
            color: var(--text-light);
        }

        .form-check-input {
            background-color: var(--bg-card);
            border: 1px solid rgba(148, 163, 184, 0.3);
        }

        .form-check-input:checked {
            background-color: var(--accent-gold);
            border-color: var(--accent-gold);
        }

        @media (max-width: 991px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.show { transform: translateX(0); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <a href="{% url 'dashboard_home' %}" class="sidebar-brand">CHRONOS<span>.</span></a>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link {% if request.path == '/dashboard/' %}active{% endif %}" href="{% url 'dashboard_home' %}"><i class="fas fa-th-large"></i> Overview</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if 'products' in request.path %}active{% endif %}" href="{% url 'dashboard_products' %}"><i class="fas fa-box"></i> Products</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if 'orders' in request.path %}active{% endif %}" href="{% url 'dashboard_orders' %}"><i class="fas fa-shopping-cart"></i> Orders</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if 'users' in request.path %}active{% endif %}" href="{% url 'dashboard_users' %}"><i class="fas fa-users"></i> Users</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if 'categories' in request.path %}active{% endif %}" href="{% url 'dashboard_categories' %}"><i class="fas fa-tags"></i> Categories</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if 'banners' in request.path %}active{% endif %}" href="{% url 'dashboard_banners' %}"><i class="fas fa-images"></i> Banners</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if 'contacts' in request.path %}active{% endif %}" href="{% url 'dashboard_contacts' %}">
                  <i class="fas fa-envelope"></i> Messages
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if 'payments' in request.path %}active{% endif %}" href="{% url 'dashboard_payments' %}"><i class="fas fa-credit-card"></i> Payments</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if 'otp' in request.path %}active{% endif %}" href="{% url 'dashboard_otp' %}"><i class="fas fa-mobile-alt"></i> OTP Logs</a>
            </li>
            <li class="nav-item mt-3" style="border-top:1px solid rgba(255,255,255,0.05);padding-top:12px;">
                <a class="nav-link" href="{% url 'track_order' %}" target="_blank"><i class="fas fa-map-marker-alt"></i> Order Tracking</a>
            </li>
            <li class="nav-item mt-4">
                <a class="nav-link text-danger" href="{% url 'home' %}"><i class="fas fa-sign-out-alt"></i> Exit to Site</a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Navbar -->
        <div class="top-navbar">
            <button class="btn btn-outline-light d-lg-none" id="sidebarToggle"><i class="fas fa-bars"></i></button>
            <input type="text" class="search-bar" placeholder="Search orders, users...">
            <div class="user-profile">
                <div class="text-end d-none d-md-block">
                    <div class="fw-bold" style="font-size: 0.9rem;">Admin User</div>
                    <div class="text-muted" style="font-size: 0.8rem;">Super Administrator</div>
                </div>
                <img src="https://ui-avatars.com/api/?name=Admin&background=D4AF37&color=fff" alt="Admin">
            </div>
        </div>

        {% block content %}{% endblock %}

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('show');
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
