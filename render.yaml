        value: "awne zyuo jotw ophx"
      - key: DEFAULT_FROM_EMAIL
        value: CHRONOS Luxury Watches <noreply@example.com>
      - key: RAZORPAY_KEY_ID
        value: "rzp_test_SsJC0KFuJLu5dG"
